services:
  rastad-backend:
    build:
      context: ./backend
    container_name: rastad-backend
    ports:
      - "9000:9000"
    environment:
      ASSISTANT_URL: http://rastad-assistant:8000
      DATABASE_URL: postgresql://postgres:postgres@rastad-postgres:5432/postgres
    depends_on:
      - postgres
      - rastad-assistant
    restart: unless-stopped

  rastad-assistant:
    build:
      context: ./assistant
    container_name: rastad-assistant
    ports:
      - "8000:8000"
    env_file:
      - ./assistant/.env
    environment:
      QDRANT_URL: http://rastad-qdrant:6333
    depends_on:
      - qdrant
    restart: unless-stopped

  postgres:
    image: postgres:17
    container_name: rastad-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rastad-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
